name: Build ELM_SAB_Add-On (Mac + Win, AC29)

permissions:
  contents: write

on:
  push:
    paths:
      - 'ELM_SAB_Add-On/**'
      - '.github/workflows/build-elm-sab-addon.yml'
  workflow_dispatch:

# Beide Jobs publizieren unabhängig in dieselbe rollende Release (elm-sab-latest).
# Kein removeArtifacts: ncipollo ersetzt gleichnamige Artefakte (replacesArtifacts=default true),
# lässt die des anderen Jobs aber stehen — so überschreiben sich Mac/Win im Parallellauf nicht.
jobs:
  build_mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build via BuildAddOn.py (lädt DevKit + LP_XMLConverter selbst)
        working-directory: ELM_SAB_Add-On
        run: |
          set -o pipefail
          python3 Tools/BuildAddOn.py -c config.json -v 29 -b RelWithDebInfo -p -r 2>&1 | tee ../build-mac.log

      - name: Locate, ad-hoc sign + zip
        run: |
          BUNDLE=$(find ELM_SAB_Add-On/Build -name "*.bundle" -not -path "*DevKit*" | head -1)
          echo "Bundle: $BUNDLE"
          codesign --force --deep -s - "$BUNDLE"
          ditto -c -k --keepParent "$BUNDLE" ELM_SAB_Add-On_AC29_Mac.zip

      - name: Publish bundle to rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: elm-sab-latest
          name: "ELM_SAB_Add-On latest (CI)"
          prerelease: true
          allowUpdates: true
          artifacts: "ELM_SAB_Add-On_AC29_Mac.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish build log
        if: always()
        uses: ncipollo/release-action@v1
        with:
          tag: elm-sab-latest
          name: "ELM_SAB_Add-On latest (CI)"
          prerelease: true
          allowUpdates: true
          artifacts: "build-mac.log"
          token: ${{ secrets.GITHUB_TOKEN }}

  build_win:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash   # git-bash ist auf windows-latest vorhanden → find/tee/pipefail wie beim Mac-Job
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build via BuildAddOn.py (lädt DevKit + LP_XMLConverter selbst)
        working-directory: ELM_SAB_Add-On
        run: |
          set -o pipefail
          python Tools/BuildAddOn.py -c config.json -v 29 -b RelWithDebInfo -p -r 2>&1 | tee ../build-win.log

      - name: Locate .apx
        run: |
          APX=$(find ELM_SAB_Add-On/Build -name "*.apx" -not -path "*DevKit*" | head -1)
          echo "APX: $APX"
          cp "$APX" ELM_SAB_Add-On_AC29_Win.apx

      - name: Publish apx to rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: elm-sab-latest
          name: "ELM_SAB_Add-On latest (CI)"
          prerelease: true
          allowUpdates: true
          artifacts: "ELM_SAB_Add-On_AC29_Win.apx"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish build log
        if: always()
        uses: ncipollo/release-action@v1
        with:
          tag: elm-sab-latest
          name: "ELM_SAB_Add-On latest (CI)"
          prerelease: true
          allowUpdates: true
          artifacts: "build-win.log"
          token: ${{ secrets.GITHUB_TOKEN }}
